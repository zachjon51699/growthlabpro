<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Qualification Assessment (Netlify Forms)</title>
  </head>
  <body>
    <!--
      Legacy Netlify Forms detection form (kept for build-time form registration).
      Live quiz submissions go through /.netlify/functions/submit-contractor-quiz → GoHighLevel.
    -->
    <form name="qualification" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="qualification" />
      <input name="bot-field" />
      <input name="firstName" />
      <input name="phone" />
      <input name="timeline" />
      <input name="monthlyRevenue" />
    </form>
  </body>
</html>
